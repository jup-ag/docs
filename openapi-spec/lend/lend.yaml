openapi: 3.0.3
info:
  title: Jupiter Lend API
  version: 1.0.0
  description: Jupiter Lend API Schema

servers:
  - url: https://api.jup.ag/lend/v1
    description: Jupiter Lend API endpoint

paths:
  /earn/deposit:
    post:
      summary: deposit
      description: |
        Request for a base64-encoded unsigned earn deposit transaction to deposit assets
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnAmountRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                transaction: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgAAEN..."

  /earn/deposit-instructions:
    post:
      summary: deposit-instructions
      description: |
        Request for the instruction of an earn deposit transaction to deposit assets
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnAmountRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionResponse'
              example:
                programId: "jup3YeL8QhtSx1e253b2FDvsMNC87fDrgQZivbrndc9"
                accounts:
                  - pubkey: "BQ72nSv9f3PRyRKCBnHLVrerrv37CYTHm5h3s9VSGQDV"
                    isSigner: true
                    isWritable: true
                  - pubkey: "So11111111111111111111111111111111111111112"
                    isSigner: false
                    isWritable: false
                data: "3Dc2AAAAAAA..."

  /earn/withdraw:
    post:
      summary: withdraw
      description: |
        Request for a base64-encoded unsigned earn withdraw transaction to withdraw assets
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnAmountRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                transaction: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgAAEN..."

  /earn/withdraw-instructions:
    post:
      summary: withdraw-instructions
      description: |
        Request for the instruction of an earn withdraw transaction to withdraw assets
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnAmountRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionResponse'
              example:
                programId: "jup3YeL8QhtSx1e253b2FDvsMNC87fDrgQZivbrndc9"
                accounts:
                  - pubkey: "BQ72nSv9f3PRyRKCBnHLVrerrv37CYTHm5h3s9VSGQDV"
                    isSigner: true
                    isWritable: true
                data: "4Ec3AAAAAAA..."

  /earn/mint:
    post:
      summary: mint
      description: |
        Request for a base64-encoded unsigned earn mint transaction to mint shares
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnSharesRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                transaction: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgAAEN..."

  /earn/mint-instructions:
    post:
      summary: mint-instructions
      description: |
        Request for the instruction of an earn mint transaction to mint shares
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnSharesRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionResponse'
              example:
                programId: "jup3YeL8QhtSx1e253b2FDvsMNC87fDrgQZivbrndc9"
                accounts:
                  - pubkey: "BQ72nSv9f3PRyRKCBnHLVrerrv37CYTHm5h3s9VSGQDV"
                    isSigner: true
                    isWritable: true
                data: "5Fd4AAAAAAA..."

  /earn/redeem:
    post:
      summary: redeem
      description: |
        Request for a base64-encoded unsigned earn redeem transaction to redeem shares
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnSharesRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                transaction: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgAAEN..."

  /earn/redeem-instructions:
    post:
      summary: redeem-instructions
      description: |
        Request for the instruction of an earn redeem transaction to redeem shares
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarnSharesRequestBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionResponse'
              example:
                programId: "jup3YeL8QhtSx1e253b2FDvsMNC87fDrgQZivbrndc9"
                accounts:
                  - pubkey: "BQ72nSv9f3PRyRKCBnHLVrerrv37CYTHm5h3s9VSGQDV"
                    isSigner: true
                    isWritable: true
                data: "6Ge5AAAAAAA..."

  /earn/tokens:
    get:
      summary: tokens
      description: |
        Request for the tokens available to be deposited and their information
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
              example:
                - id: "So11111111111111111111111111111111111111112"
                  address: "So11111111111111111111111111111111111111112"
                  name: "Wrapped SOL"
                  symbol: "SOL"
                  decimals: 9
                  assetAddress: "So11111111111111111111111111111111111111112"
                  asset:
                    address: "So11111111111111111111111111111111111111112"
                    chain_id: 0
                    name: "Wrapped SOL"
                    symbol: "SOL"
                    decimals: 9
                    logo_url: "https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png"
                    price: 171.34
                    coingecko_id: "solana"
                  totalAssets: "1500000000000"
                  totalSupply: "1450000000000"
                  convertToShares: "0.966667"
                  convertToAssets: "1.034483"
                  rewardsRate: "0.035"
                  supplyRate: "0.025"
                  totalRate: "0.06"

  /earn/positions:
    get:
      summary: positions
      description: |
        Request for the position data of one or multiple users
      security:
        - ApiKeyAuth: []
      parameters:
        - name: users
          in: query
          description: |
            User wallet addresses (comma separated)
          required: true
          schema:
            type: string
          example: "HYbxGkNvEwvZ14RzJHPB9h3dWfXjxwAEhkyzJRHx1hBf,jdocuPgEAjMfihABsPgKEvYtsmMzjUHeq9LX4Hvs7f3"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPositionsResponse'
              example:
                - token:
                    id: "So11111111111111111111111111111111111111112"
                    address: "So11111111111111111111111111111111111111112"
                    name: "Wrapped SOL"
                    symbol: "SOL"
                    decimals: 9
                  ownerAddress: "BQ72nSv9f3PRyRKCBnHLVrerrv37CYTHm5h3s9VSGQDV"
                  shares: "100000000"
                  underlyingAssets: "103448300"
                  underlyingBalance: "17.72"
                  allowance: "1000000000"

  /earn/earnings:
    get:
      summary: earnings
      description: |
        Request for the earnings of one or multiple positions of a user
      security:
        - ApiKeyAuth: []
      parameters:
        - name: user
          in: query
          description: |
            User wallet address
          required: true
          schema:
            type: string
          example: "HYbxGkNvEwvZ14RzJHPB9h3dWfXjxwAEhkyzJRHx1hBf"
        - name: positions
          in: query
          description: |
            User token positions (comma-separated)
          required: true
          schema:
            type: string
          example: "9BEcn9aPEmhSPbPQeFGjidRiEKki46fVQDyPpSQXPA2D,2uQsyo1fXXQkDtcpXnLofWy88PxcvnfH2L8FPSE62FVU"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEarningsResponse'
              example:
                - address: "So11111111111111111111111111111111111111112"
                  ownerAddress: "BQ72nSv9f3PRyRKCBnHLVrerrv37CYTHm5h3s9VSGQDV"
                  earnings: 34483000
                  slot: 345678901

  /borrow/vaults:
    get:
      summary: vaults
      description: |
        Request for all borrow vaults and their configuration, rates, and liquidity
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BorrowVaultsResponse'
              example:
                - id: 1
                  address: "nMzVs8GiXMVUENEwkev7JZfDcCENmz18ScheeVRdnb1"
                  supplyToken:
                    address: "So11111111111111111111111111111111111111112"
                    name: "Wrapped SOL"
                    symbol: "WSOL"
                    decimals: 9
                    price: "69.02996827828"
                  borrowToken:
                    address: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
                    name: "USD Coin"
                    symbol: "USDC"
                    decimals: 6
                    price: "0.999783432508"
                  totalSupply: "1960819459279176"
                  totalBorrow: "62111727522195"
                  collateralFactor: "800"
                  liquidationThreshold: "850"
                  liquidationMaxLimit: "900"
                  liquidationPenalty: "100"
                  supplyRate: "453"
                  borrowRate: "487"
                  borrowable: "15527917008942"
                  withdrawable: "390594064267949"
                  minimumBorrowing: "1042605"
                  totalPositions: 9062
                  oracle: "6uU9EvKL1rSTyw3ZqKz4hMNEB4NBCo3D3rg3n13fymHm"
                  oraclePrice: "69027090000000000"

  /borrow/positions:
    get:
      summary: positions
      description: |
        Request for the borrow positions of one or multiple users
      security:
        - ApiKeyAuth: []
      parameters:
        - name: users
          in: query
          description: |
            User wallet addresses (comma separated)
          required: true
          schema:
            type: string
          example: "HYbxGkNvEwvZ14RzJHPB9h3dWfXjxwAEhkyzJRHx1hBf,TEsTKPSD2RBQxFHgxqmr3YLayAWWz2kpESk5wdoeB62"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BorrowPositionsResponse'
              example:
                - id: 9062
                  vaultId: 1
                  address: "8n9HQKPQuUzCGeFWBezWW28Ed4HLFv2Xuqse1JbjuVNn"
                  supply: "30000000"
                  borrow: "1100000"
                  isLiquidated: false
                  isSupplyPosition: false
                  dustBorrow: "773"
                  ownerAddress: "GpLjUnj5q8V6jkaaT7q26rQ4hzn7KYoebLRWfk16hTwh"

  /borrow/operate:
    post:
      summary: operate
      description: |
        Request for a base64-encoded unsigned borrow operate transaction. A single
        operate call can create a position, deposit collateral, borrow, repay, and
        withdraw, driven by signed `colAmount` and `debtAmount` values.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperatePayload'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperateTransactionResponse'
              example:
                nftId: 9062
                transaction: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgAAEN..."

  /borrow/operate-instructions:
    post:
      summary: operate-instructions
      description: |
        Request for the instructions of a borrow operate transaction, plus the address
        lookup tables required to compile a v0 transaction. Use this to compose the
        operation with other instructions or for CPI.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OperatePayload'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperateInstructionsResponse'
              example:
                nftId: 9062
                instructions:
                  - programId: "jupr81YtYssSyPt8jbnGuiWon5f6x9TcDEFxYe3Bdzi"
                    accounts:
                      - pubkey: "GpLjUnj5q8V6jkaaT7q26rQ4hzn7KYoebLRWfk16hTwh"
                        isSigner: true
                        isWritable: true
                      - pubkey: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
                        isSigner: false
                        isWritable: false
                    data: "xRQKAWGgsVsBAF8jAAA="
                addressLookupTableAddresses:
                  - "3eB86bwSJanGwLo5WoMQZL7Bk7uubCRggZKshJKJVKwx"


components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Get API key via https://developers.jup.ag/portal
  schemas:
    EarnAmountRequestBody:
      type: object
      required:
        - asset
        - signer
        - amount
      properties:
        asset:
          type: string
          default: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
        signer:
          type: string
          default: "vBXNsd5SRtTPpW7GWv3wREA6Ztm2jCWp5eqqTsVhyG5"
        amount:
          type: string
          default: "5"
      example:
        asset: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
        signer: "HYbxGkNvEwvZ14RzJHPB9h3dWfXjxwAEhkyzJRHx1hBf"
        amount: "1000000"

    EarnSharesRequestBody:
      type: object
      required:
        - asset
        - signer
        - shares
      properties:
        asset:
          type: string
          default: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
        signer:
          type: string
          default: "HYbxGkNvEwvZ14RzJHPB9h3dWfXjxwAEhkyzJRHx1hBf"
        shares:
          type: string
          default: "1000000"
      example:
        asset: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
        signer: "HYbxGkNvEwvZ14RzJHPB9h3dWfXjxwAEhkyzJRHx1hBf"
        shares: "1000000"

    TransactionResponse:
      type: object
      required:
        - transaction
      properties:
        transaction:
          type: string

    InstructionResponse:
      type: object
      required:
        - programId
        - accounts
        - data
      properties:
        programId:
          type: string
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountMeta'
        data:
          type: string

    AccountMeta:
      type: object
      required:
        - pubkey
        - isSigner
        - isWritable
      properties:
        pubkey:
          type: string
        isSigner:
          type: boolean
        isWritable:
          type: boolean

    TokensResponse:
      type: array
      items:
        $ref: '#/components/schemas/TokenInfo'

    UserPositionsResponse:
      type: array
      items:
        $ref: '#/components/schemas/UserPosition'

    UserEarningsResponse:
      type: object
      required:
        - address
        - ownerAddress
        - earnings
        - slot
      properties:
        address:
          type: string
        ownerAddress:
          type: string
        earnings:
          type: number
        slot:
          type: number

    UserPosition:
      type: object
      required:
        - token
        - ownerAddress
        - shares
        - underlyingAssets
        - underlyingBalance
        - allowance
      properties:
        token:
          $ref: '#/components/schemas/TokenInfo'
        ownerAddress:
          type: string
          description: |
            - Address of user's wallet
        shares:
          type: string
          description: |
            - Balance of user's jlTokens
        underlyingAssets:
          type: string
          description: |
            - Balance of user's USDC in protocol (including intereste accured)
        underlyingBalance:
          type: string
          description: |
            - Balance of user's USDC in wallet
        allowance:
          type: string

    TokenInfo:
      type: object
      required:
        - id
        - address
        - name
        - symbol
        - decimals
        - assetAddress
        - asset
        - totalAssets
        - totalSupply
        - convertToShares
        - convertToAssets
        - rewardsRate
        - supplyRate
        - totalRate
        - rebalanceDifference
        - liquiditySupplyData
      properties:
        id:
          type: integer
          description: |
            - Lending ID, starts from `1`
        address:
          type: string
          description: |
            - Lending token address like `9BEcn9aPEmhSPbPQeFGjidRiEKki46fVQDyPpSQXPA2D`
        name:
          type: string
          description: |
            - Lending token name like Jupiter Lend USDC
        symbol:
          type: string
          description: |
            - Lending token symbol like jlUSDC
        decimals:
          type: integer
        assetAddress:
          type: string
          description: |
            - Lending token underlying asset address like `EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v`
        asset:
          $ref: '#/components/schemas/AssetInfo'
        totalAssets:
          type: string
          description: |
            - Total available underlying mint from jlTokens (with accured interest)
        totalSupply:
          type: string
          description: |
            - Total supply of jlTokens for this mint
        convertToShares:
          type: string
          description: |
            - Value of one 1 underlying token to jlToken, like 1 USDC = X jlUSDC
            - Used for conversion
        convertToAssets:
          type: string
          description: |
            - Value of one 1 jlToken token to underlying mint, like 1 jlUSDC = X USDC
            - Used for conversion
        rewardsRate:
          type: string
          description: |
            - Rewards rate , in 1e4 decimals
        supplyRate:
          type: string
          description: |
            - Supply rate, in 1e4 decimals
        totalRate:
          type: string
          description: |
            - Total sum of rewards + supply rate
        rebalanceDifference:
          type: string
        liquiditySupplyData:
          $ref: '#/components/schemas/LiquiditySupplyData'

    AssetInfo:
      type: object
      required:
        - address
        - chain_id
        - name
        - symbol
        - decimals
        - logo_url
        - price
        - coingecko_id
      properties:
        address:
          type: string
          description: |
            - Lending token underlying asset address like `EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v`
        chain_id:
          type: string
          description: |
            - Lending token underlying asset chain id like `solana`
        name:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        logo_url:
          type: string
          format: uri
        price:
          type: string
        coingecko_id:
          type: string

    LiquiditySupplyData:
      type: object
      required:
        - modeWithInterest
        - supply
        - withdrawalLimit
        - lastUpdateTimestamp
        - expandPercent
        - expandDuration
        - baseWithdrawalLimit
        - withdrawableUntilLimit
        - withdrawable
      properties:
        modeWithInterest:
          type: boolean
          description: |
            - The underlying asset is earning interest at liquidity layer
        supply:
          type: string
          description: |
            - Total supply of underlying asset on liquidity layer
            - In decimals, like 3168044480191 / 1e6 for USDC
        withdrawalLimit:
          type: string
          description: |
            - Available withdrawal limit for this asset
        lastUpdateTimestamp:
          type: string
          description: |
            - When was the reserve last updated
        expandPercent:
          type: string
        expandDuration:
          type: string
        baseWithdrawalLimit:
          type: string
        withdrawableUntilLimit:
          type: string
        withdrawable:
          type: string
          description: |
            - Total amount withdrawable at this current point, it expands every second.

    OperatePayload:
      type: object
      required:
        - vaultId
        - positionId
        - signer
        - colAmount
        - debtAmount
      properties:
        vaultId:
          type: integer
          description: |
            - Vault ID from `GET /borrow/vaults`
        positionId:
          type: integer
          description: |
            - Position NFT ID to operate on
            - Use `0` to create a new position. The assigned `nftId` is returned in the response
        positionOwner:
          type: string
          description: |
            - Owner of the position. Defaults to `signer` when omitted
        signer:
          type: string
          description: |
            - Wallet that signs and pays for the transaction
        colAmount:
          type: string
          description: |
            - Signed collateral amount, in the supply token's base units
            - Positive to deposit collateral, negative to withdraw collateral, `0` for no change
            - Use `-170141183460469231731687303715884105728` (MIN_I128) to withdraw all collateral
        debtAmount:
          type: string
          description: |
            - Signed debt amount, in the borrow token's base units
            - Positive to borrow, negative to repay, `0` for no change
            - Use `-170141183460469231731687303715884105728` (MIN_I128) to repay all debt
      example:
        vaultId: 1
        positionId: 0
        signer: "GpLjUnj5q8V6jkaaT7q26rQ4hzn7KYoebLRWfk16hTwh"
        colAmount: "30000000"
        debtAmount: "0"

    OperateTransactionResponse:
      type: object
      required:
        - nftId
        - transaction
      properties:
        nftId:
          type: integer
          description: |
            - Position NFT ID. For a new position (`positionId: 0`), this is the newly assigned ID
        transaction:
          type: string
          description: |
            - Base64-encoded unsigned VersionedTransaction

    OperateInstructionsResponse:
      type: object
      required:
        - nftId
        - instructions
        - addressLookupTableAddresses
      properties:
        nftId:
          type: integer
          description: |
            - Position NFT ID. For a new position (`positionId: 0`), this is the newly assigned ID
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/BorrowInstruction'
        addressLookupTableAddresses:
          type: array
          description: |
            - Address lookup table addresses required to compile the v0 transaction
          items:
            type: string

    BorrowInstruction:
      type: object
      required:
        - programId
        - accounts
        - data
      properties:
        programId:
          type: string
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountMeta'
        data:
          type: string

    BorrowVaultsResponse:
      type: array
      items:
        $ref: '#/components/schemas/BorrowVault'

    BorrowPositionsResponse:
      type: array
      items:
        $ref: '#/components/schemas/BorrowPosition'

    BorrowVaultToken:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        price:
          type: string
        logoUrl:
          type: string
          format: uri
        coingeckoId:
          type: string

    BorrowVault:
      type: object
      description: |
        Borrow vault configuration, rates, and liquidity. Additional fields beyond those
        listed are returned. See the Read SDK docs for the full type and exact scaling notes.
      properties:
        id:
          type: integer
          description: |
            - Vault ID, used as `vaultId` in operate calls
        address:
          type: string
        supplyToken:
          allOf:
            - $ref: '#/components/schemas/BorrowVaultToken'
          description: |
            - Collateral token accepted by the vault
        borrowToken:
          allOf:
            - $ref: '#/components/schemas/BorrowVaultToken'
          description: |
            - Token that can be borrowed against collateral
        totalSupply:
          type: string
        totalBorrow:
          type: string
        collateralFactor:
          type: string
          description: |
            - Maximum loan-to-value. `800` corresponds to 80%
        liquidationThreshold:
          type: string
          description: |
            - LTV at which a position becomes liquidatable. `850` corresponds to 85%
        liquidationMaxLimit:
          type: string
          description: |
            - Hard LTV cap. `900` corresponds to 90%
        liquidationPenalty:
          type: string
          description: |
            - Penalty applied to collateral on liquidation
        supplyRate:
          type: string
          description: |
            - Collateral supply APR in basis points. `453` = 4.53%
        borrowRate:
          type: string
          description: |
            - Borrow APR in basis points. `487` = 4.87%
        borrowable:
          type: string
          description: |
            - Amount currently borrowable from the vault, in borrow-token base units
        withdrawable:
          type: string
          description: |
            - Amount of collateral currently withdrawable, in supply-token base units
        minimumBorrowing:
          type: string
          description: |
            - Minimum debt a position must hold, in borrow-token base units. A non-zero debt below this fails with `VaultUserDebtTooLow`
        totalPositions:
          type: integer
        oracle:
          type: string
        oraclePrice:
          type: string
          description: |
            - Oracle price of collateral in terms of the borrow token. See the Read SDK docs for scaling

    BorrowPosition:
      type: object
      description: |
        A user's borrow position in a vault. The nested `vault` object carries the full vault data.
      properties:
        id:
          type: integer
          description: |
            - Position NFT ID
        vaultId:
          type: integer
        address:
          type: string
          description: |
            - Position account address
        supply:
          type: string
          description: |
            - Collateral supplied, in supply-token base units
        borrow:
          type: string
          description: |
            - Debt owed, in borrow-token base units
        isLiquidated:
          type: boolean
        isSupplyPosition:
          type: boolean
          description: |
            - True when the position holds collateral but no debt
        dustBorrow:
          type: string
          description: |
            - Residual debt including accrued interest, not reflected in `borrow`. Repay with the MIN_I128 sentinel to clear all debt
        ownerAddress:
          type: string
        vault:
          $ref: '#/components/schemas/BorrowVault'
