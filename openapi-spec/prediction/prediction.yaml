      responses:
        "200":
          description: Unsigned transaction to claim payout for a winning position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimPositionResponse"
        "400":
          description: Unable to build claim payout transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Position not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /history:
    get:
      tags:
        - History
      parameters:
        - schema:
            type: integer
            nullable: true
            minimum: 0
          required: false
          name: start
          in: query
        - schema:
            type: integer
            nullable: true
            minimum: 0
          required: false
          name: end
          in: query
        - schema:
            type: string
            minLength: 32
            description: History owner public key
          required: false
          description: History owner public key
          name: ownerPubkey
          in: query
        - schema:
            type: integer
            minimum: 1
            description: History event ID
          required: false
          description: History event ID
          name: id
          in: query
        - schema:
            type: string
            minLength: 32
            description: Filter by position public key
          required: false
          description: Filter by position public key
          name: positionPubkey
          in: query
      responses:
        "200":
          description: Paginated event history, or single event when id is provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HistoryEvent"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                required:
                  - data
                  - pagination
  /forecast:
    get:
      tags:
        - Forecast
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          description: Market identifier to fetch the forecast for. Required; omitting it returns 400.
          name: marketId
          in: query
      responses:
        "200":
          description: Forecast time-series for the market
          content:
            application/json:
              schema:
                type: object
                properties:
                  forecast_history:
                    type: array
                    items:
                      type: object
                      properties:
                        market_ticker:
                          type: string
                        event_ticker:
                          type: string
                        end_period_ts:
                          type: number
                        period_interval:
                          type: number
                        numerical_forecast:
                          type: number
                        raw_numerical_forecast:
                          type: number
                        formatted_forecast:
                          type: string
        "400":
          description: Invalid or missing market ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to fetch forecast data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /trading-status:
    get:
      tags:
        - Trading
      responses:
        "200":
          description: Whether trading is currently enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingStatusResponse"
  /orderbook/{marketId}:
    get:
      tags:
        - Orderbook
      parameters:
        - schema:
            type: string
            minLength: 1
            description: Kalshi or Polymarket market identifier
            example: KXF1-25-LN
          required: true
          description: Kalshi or Polymarket market identifier
          name: marketId
          in: path
      responses:
        "200":
          description: Orderbook depth for the given market
          content:
            application/json:
              schema:
                type: object
                nullable: true
                properties:
                  yes:
                    type: array
                    description: YES-side levels sorted by price ascending. Each entry is a [price_cents, size] tuple. price_cents is rounded, so sub-cent levels show 0; size may be fractional.
                    items:
                      type: array
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                  no:
                    type: array
                    description: NO-side levels sorted by price ascending. Each entry is a [price_cents, size] tuple. price_cents is rounded, so sub-cent levels show 0; size may be fractional.
                    items:
                      type: array
                      items:
                        type: number
                      minItems: 2
                      maxItems: 2
                  yes_dollars:
                    type: array
                    description: "YES-side levels with price as decimal dollar string. Each entry is a [price_string, size] tuple, e.g. [\"0.0100\", 346014]."
                    items:
                      type: array
                      minItems: 2
                      maxItems: 2
                  no_dollars:
                    type: array
                    description: "NO-side levels with price as decimal dollar string. Each entry is a [price_string, size] tuple, e.g. [\"0.0100\", 219]."
                    items:
                      type: array
                      minItems: 2
                      maxItems: 2
                required:
                  - yes
                  - no
                  - yes_dollars
                  - no_dollars
        "502":
          description: Failed to fetch orderbook data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profiles/{ownerPubkey}:
    get:
      tags:
        - Profile
      parameters:
        - schema:
            type: string
          required: true
          name: ownerPubkey
          in: path
      responses:
        "200":
          description: Profile stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  ownerPubkey:
                    type: string
                  realizedPnlUsd:
                    type: string
                  totalVolumeUsd:
                    type: string
                  predictionsCount:
                    type: string
                  correctPredictions:
                    type: string
                  wrongPredictions:
                    type: string
                  totalActiveContracts:
                    type: string
                    description: Legacy whole-contract count. Use totalActiveContractsMicro or totalActiveContractsDecimal for the exact value.
                  totalActiveContractsMicro:
                    type: string
                    description: Active contracts in micro-contract units (1000000 = 1 contract)
                  totalActiveContractsDecimal:
                    type: string
                    description: Active contracts as a decimal string
                  totalPositionsValueUsd:
                    type: string
                required:
                  - ownerPubkey
                  - realizedPnlUsd
                  - totalVolumeUsd
                  - predictionsCount
                  - correctPredictions
                  - wrongPredictions
                  - totalActiveContracts
                  - totalPositionsValueUsd
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
  /profiles/{ownerPubkey}/pnl-history:
    get:
      tags:
        - Profile
      parameters:
        - schema:
            type: string
          required: true
          name: ownerPubkey
          in: path
        - schema:
            type: string
            enum:
              - 24h
              - 1w
              - 1m
            default: 1w
          required: false
          name: interval
          in: query
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
            maximum: 1000
            default: 10
          required: false
          name: count
          in: query
      responses:
        "200":
          description: PnL history for charting
          content:
            application/json:
              schema:
                type: object
                properties:
                  ownerPubkey:
                    type: string
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: integer
                        realizedPnlUsd:
                          type: string
                      required:
                        - timestamp
                        - realizedPnlUsd
                required:
                  - ownerPubkey
                  - history
  /trades:
    get:
      tags:
        - Trades
      responses:
        "200":
          description: Recent order_filled events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Trade identifier (e.g. "order-1906029")
                        ownerPubkey:
                          type: string
                        marketId:
                          type: string
                        message:
                          type: string
                        timestamp:
                          type: number
                        action:
                          type: string
                          enum:
                            - buy
                            - sell
                        side:
                          type: string
                          enum:
                            - "yes"
                            - "no"
                        eventTitle:
                          type: string
                        marketTitle:
                          type: string
                        amountUsd:
                          type: string
                        priceUsd:
                          type: string
                        eventImageUrl:
                          type: string
                        eventId:
                          type: string
                        isTeamMarket:
                          type: boolean
                        marketOptions:
                          type: array
                          items:
                            type: object
                            properties:
                              label:
                                type: string
                              buyYes:
                                type: boolean
                      required:
                        - id
                        - ownerPubkey
                        - marketId
                        - message
                        - timestamp
                        - action
                        - side
                        - eventTitle
                        - marketTitle
                        - amountUsd
                        - priceUsd
                        - eventImageUrl
                        - eventId
                required:
                  - data
  /leaderboards:
    get:
      tags:
        - Leaderboards
      parameters:
        - schema:
            type: string
            enum:
              - all_time
              - weekly
              - monthly
            default: all_time
          required: false
          name: period
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          required: false
          name: limit
          in: query
        - schema:
            type: string
            enum:
              - pnl
              - volume
              - win_rate
            default: pnl
          required: false
          name: metric
          in: query
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ownerPubkey:
                          type: string
                        realizedPnlUsd:
                          type: string
                        totalVolumeUsd:
                          type: string
                        predictionsCount:
                          type: number
                        correctPredictions:
                          type: number
                        wrongPredictions:
                          type: number
                        winRatePct:
                          type: string
                        period:
                          type: string
                        periodStart:
                          type: string
                          nullable: true
                        periodEnd:
                          type: string
                          nullable: true
                      required:
                        - ownerPubkey
                        - realizedPnlUsd
                        - totalVolumeUsd
                        - predictionsCount
                        - correctPredictions
                        - wrongPredictions
                        - winRatePct
                        - period
                        - periodStart
                        - periodEnd
                  summary:
                    type: object
                    properties:
                      all_time:
                        type: object
                        properties:
                          totalVolumeUsd:
                            type: string
                          predictionsCount:
